<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blank Traveller Sheet — Bridge at Sea</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: white; }

    .page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: repeat(3, 1fr);
        gap: 5mm;
        padding: 6mm;
        width: 210mm;
        height: 297mm;
        page-break-after: always;
        break-after: page;
    }

    .traveller {
        border: 2px solid #0a1628;
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .trav-header {
        background: linear-gradient(135deg, #0a1628 0%, #1a3050 100%);
        color: white;
        padding: 4px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
    }

    .trav-brand {
        font-size: 7pt;
        font-weight: 700;
        color: #c8aa5a;
        letter-spacing: 0.5px;
    }

    .trav-url {
        font-size: 6pt;
        color: rgba(255,255,255,0.7);
    }

    .trav-meta {
        background: #f0ebe0;
        padding: 3px 8px;
        display: flex;
        gap: 12px;
        font-size: 7pt;
        color: #2c3e50;
        border-bottom: 1px solid #ddd;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
    }

    .trav-meta span { font-weight: 700; }
    .trav-meta .fill { border-bottom: 1px solid #999; display: inline-block; width: 40px; }

    table {
        width: 100%;
        border-collapse: collapse;
        flex: 1;
        font-size: 6.5pt;
    }

    thead tr {
        background: #0a1628;
        color: white;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
    }

    th {
        padding: 3px 2px;
        text-align: center;
        border: 1px solid #1a3050;
        font-size: 6pt;
        font-weight: 700;
        line-height: 1.2;
    }

    td {
        padding: 0px 2px;
        border: 1px solid #ccc;
        text-align: center;
        height: 10px;
        font-size: 6.5pt;
        color: #2c3e50;
        font-weight: 600;
    }

    tr:nth-child(even) td {
        background: #f9f8f5;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
    }

    .ns-col { color: #27ae60; }
    .ew-col { color: #e74c3c; }

    @media print {
        @page { size: A4 portrait; margin: 0; }
        body { margin: 0; }
    }
</style>
</head>
<body>
<div class="page">
</div>
</body>
</html>
